<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OpsOh Tools</title>
  <meta name="description" content="Simple online tools by OpsOh. No subscriptions. Fast, private, and easy." />
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:#0b0f14;color:#fff}
    .wrap{max-width:980px;margin:0 auto;padding:28px 18px}
    a{color:#fff;text-decoration:none}
    a:hover{text-decoration:underline}
    .card{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);border-radius:16px;padding:16px}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    .title{font-size:28px;font-weight:800;margin:0 0 6px}
    .sub{color:rgba(255,255,255,.7);margin:0 0 18px;line-height:1.5}
    .item-title{font-weight:800;margin:0 0 4px}
    .item-sub{color:rgba(255,255,255,.7);margin:0}
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">OpsOh Tools</h1>
    <p class="sub">Private, fast, browser-based tools. No uploads. No subscriptions.</p>

    <div class="grid">
      <a class="card" href="/tools/csv-to-vcf/">
        <div class="item-title">CSV → VCF Converter</div>
        <p class="item-sub">Convert contacts CSV files into a .VCF (vCard) you can import anywhere.</p>
      </a>
    </div>
  </div>
</body>
</html>
